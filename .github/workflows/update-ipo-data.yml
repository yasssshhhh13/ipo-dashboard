name: Update Live IPO Data

on:
  schedule:
    # Every hour, every day. Cron is UTC.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper and discovery
        run: |
          node scripts/scrape-ipo-data.mjs
          node scripts/discover-new-ipos.mjs

      - name: Commit updated data if changed
        run: |
          git config user.name "ipo-data-bot"
          git config user.email "actions@github.com"
          git add public/live-data.json public/ipos.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated update of live data and discovered IPOs"
            git push
          else
            echo "No data changes — skipping commit."
          fi
