name: Update Live IPO Data

on:
  schedule:
    # Every 2 hours, covering Indian market/grey-market hours. Cron is UTC;
    # IST = UTC + 5:30.
    - cron: "0 */2 * * 1-5"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scripts/scrape-ipo-data.mjs

      - name: Commit updated data if changed
        run: |
          git config user.name "ipo-data-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- public/live-data.json; then
            git add public/live-data.json
            git commit -m "chore: refresh live IPO data [automated]"
            git push
          else
            echo "No data changes — skipping commit."
          fi
